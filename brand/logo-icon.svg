<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon only — dark navy background, teal clock -->
  <rect width="64" height="64" rx="14" fill="#0a0f1a"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" stroke="#00d4aa" stroke-width="0.5" fill="none" opacity="0.2"/>
  <!-- Clock face -->
  <circle cx="32" cy="32" r="24" stroke="#00d4aa" stroke-width="2.5" fill="none"/>
  <!-- Hour hand → 10 o'clock (angle 300°, length 13) -->
  <line x1="32" y1="32" x2="20.7" y2="25.5" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand → 2 o'clock (angle 60°, length 17) -->
  <line x1="32" y1="32" x2="46.7" y2="23.5" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="2.5" fill="#00d4aa"/>
  <!-- Checkmark (inside lower half of clock) -->
  <path d="M24.5 35 L30 41 L42 28" stroke="#00d4aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
