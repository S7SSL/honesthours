<svg width="240" height="60" viewBox="0 0 240 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background logo (dark navy canvas) -->
  <rect width="240" height="60" fill="#0a0f1a"/>
  <!-- Clock icon: center (30,30), radius 22 -->
  <circle cx="30" cy="30" r="22" stroke="#00d4aa" stroke-width="2" fill="none"/>
  <circle cx="30" cy="30" r="25" stroke="#00d4aa" stroke-width="0.5" fill="none" opacity="0.15"/>
  <!-- Hour hand → 10 o'clock -->
  <line x1="30" y1="30" x2="18.7" y2="23.5" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand → 2 o'clock -->
  <line x1="30" y1="30" x2="44.7" y2="21.5" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="30" cy="30" r="1.8" fill="#00d4aa"/>
  <!-- Checkmark -->
  <path d="M23.5 33.5 L28 38 L37.5 27.5" stroke="#00d4aa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <!-- Wordmark -->
  <text font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" letter-spacing="-0.3">
    <tspan x="62" y="38" fill="#ffffff" font-weight="400">Honest</tspan><tspan fill="#00d4aa" font-weight="700">Hours</tspan>
  </text>
</svg>
