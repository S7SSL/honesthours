<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C851;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad)" opacity="0.1"/>
  <!-- Clock circle -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#grad)" stroke-width="2"/>
  <!-- Hour hand (pointing up-right) -->
  <line x1="32" y1="32" x2="32" y2="12" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand (pointing down-right) -->
  <line x1="32" y1="32" x2="45" y2="45" stroke="#00C851" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#00D9FF"/>
  <!-- Check mark accent (bottom right) -->
  <path d="M 48 28 L 52 32 L 48 36" stroke="#00C851" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
