<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0F3A2E"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="100%" style="stop-color:#00C851"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg1)"/>
  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accent1)"/>
  <!-- Main headline -->
  <text x="60" y="120" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#F0F4F9" letter-spacing="-1">
    Every Productivity Tool
  </text>
  <text x="60" y="190" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#F0F4F9" letter-spacing="-1">
    Has the Same Problem
  </text>
  <!-- Tagline -->
  <text x="60" y="280" font-family="Poppins, Arial, sans-serif" font-size="28" fill="#00D9FF" font-weight="500">
    Surveillance disguised as productivity.
  </text>
  <!-- Bottom CTA -->
  <rect x="60" y="350" width="300" height="80" rx="8" fill="url(#accent1)"/>
  <text x="210" y="405" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#1A1A2E" text-anchor="middle">
    There's a better way
  </text>
  <!-- Hashtags -->
  <text x="60" y="560" font-family="Poppins, Arial, sans-serif" font-size="18" fill="#00C851">
    #RemoteWork #TrustInTeams #ProductivityTools
  </text>
</svg>
