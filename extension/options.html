<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Honest Hours — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #7ee8a2;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #555;
      margin-bottom: 36px;
    }

    h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #444;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1a1a1a;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #7ee8a2;
    }

    input::placeholder {
      color: #333;
    }

    .hint {
      font-size: 11px;
      color: #444;
      margin-top: 5px;
    }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: #7ee8a2;
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn-save:hover { background: #6dd992; }

    .toast {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(126, 232, 162, 0.12);
      border: 1px solid rgba(126, 232, 162, 0.3);
      border-radius: 8px;
      color: #7ee8a2;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .section { margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⏱ Honest Hours</div>
    <div class="subtitle">Employee profile setup</div>

    <div class="section">
      <h2>Your Details</h2>
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="employeeName" placeholder="e.g. Ahmed Al-Rashid" />
      </div>
      <div class="field">
        <label>Your Employee ID or Email</label>
        <input type="text" id="employeeId" placeholder="e.g. ahmed@company.com" />
        <div class="hint">This is how your employer identifies you in the dashboard.</div>
      </div>
    </div>

    <div class="section">
      <h2>Company</h2>
      <div class="field">
        <label>Company Code</label>
        <input type="text" id="companyCode" placeholder="e.g. ACME-2024" />
        <div class="hint">Get this from your employer or HR team.</div>
      </div>
    </div>

    <div class="section">
      <h2>Advanced</h2>
      <div class="field">
        <label>API Endpoint</label>
        <input type="text" id="apiEndpoint" placeholder="https://honesthours-api.onrender.com" />
        <div class="hint">Leave blank unless your company self-hosts Honest Hours.</div>
      </div>
    </div>

    <button class="btn-save" id="saveBtn">Save Settings</button>
    <div class="toast" id="toast">✓ Settings saved</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
